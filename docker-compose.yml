version: "3.9"

networks:
  loan-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kong_data:

  uploads_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: loandb
      POSTGRES_USER: loanuser
      POSTGRES_PASSWORD: loanpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - loan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loanuser -d loandb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: loan-redis
    restart: unless-stopped
    command: redis-server --requirepass redispass --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - loan-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog (Email Catcher) ─────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: loan-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - loan-net

  # ── Kong Database (for Kong config) ────────────────────────
  kong-db:
    image: postgres:16-alpine
    container_name: loan-kong-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      - kong_data:/var/lib/postgresql/data
    networks:
      - loan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kong Migration ──────────────────────────────────────────
  kong-migration:
    image: kong:3.6-ubuntu
    container_name: loan-kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    networks:
      - loan-net
    depends_on:
      kong-db:
        condition: service_healthy
    restart: on-failure

  # ── Kong Gateway ────────────────────────────────────────────
  kong:
    image: kong:3.6-ubuntu
    container_name: loan-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"   # Kong proxy (all API calls go through here)
      - "8001:8001"   # Kong admin API
    networks:
      - loan-net
    depends_on:
      - kong-migration
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Ollama runs natively on host Mac (not in Docker) ─────────
  # Ollama is already running on your Mac Mini using Apple Metal.
  # Docker containers reach it via host.docker.internal:11434

  # ── Mock Integration Hub ────────────────────────────────────
  mock-hub:
    build:
      context: ./mock-hub
      dockerfile: Dockerfile
    container_name: loan-mock-hub
    restart: unless-stopped
    environment:
      - PORT=9000
      - MAILHOG_HOST=mailhog
      - MAILHOG_PORT=1025
    ports:
      - "9000:9000"
    networks:
      - loan-net
    depends_on:
      - mailhog
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (AI Agent + API) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loan-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://loanuser:loanpass@postgres:5432/loandb
      - REDIS_URL=redis://:redispass@redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3:latest
      - OLLAMA_EMBED_MODEL=nomic-embed-text:latest
      - OLLAMA_FALLBACK_MODEL=llama3.1:latest
      - MOCK_HUB_URL=http://mock-hub:9000
      - JWT_SECRET=change-me-in-production-use-long-random-string
      - ENVIRONMENT=development
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads_data:/app/uploads
      - ./backend:/app  # hot reload in dev
    ports:
      - "8080:8080"
    networks:
      - loan-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (React) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loan-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api  # direct to backend
      - VITE_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    networks:
      - loan-net
    depends_on:
      - backend

  # ── Langfuse (LLM Observability) ────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    container_name: loan-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3030:3000"
    networks:
      - loan-net
    environment:
      DATABASE_URL: postgresql://loanuser:loanpass@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: loan-intake-nextauth-secret
      SALT: loan-intake-salt-secret
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      # Auto-create org, project and API keys on first boot
      LANGFUSE_INIT_ORG_ID: loan-org
      LANGFUSE_INIT_ORG_NAME: "Loan Intake"
      LANGFUSE_INIT_PROJECT_ID: loan-project
      LANGFUSE_INIT_PROJECT_NAME: "Loan Agent"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-loan-intake-key
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-loan-intake-key
      LANGFUSE_INIT_USER_EMAIL: admin@admin.com
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: admin123

  # ── Dozzle (Docker log viewer) ──────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: loan-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    environment:
      DOZZLE_FILTER: "name=loan-"   # only show loan-* containers
      DOZZLE_LEVEL: debug
    networks:
      - loan-net

  # ── pgAdmin (Postgres web UI) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: loan-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    networks:
      - loan-net
    depends_on:
      - postgres

  # ── RedisInsight (Redis web UI) ──────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: loan-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - loan-net
    depends_on:
      - redis

  # ── Kong Config Initialiser ─────────────────────────────────
  kong-init:
    image: curlimages/curl:latest
    container_name: loan-kong-init
    networks:
      - loan-net
    depends_on:
      kong:
        condition: service_healthy
    volumes:
      - ./infrastructure/kong/init.sh:/init.sh
    command: sh /init.sh
    restart: on-failure